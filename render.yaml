# Render Blueprint for the Spoken backend (Docker).
# Deploy: Render dashboard -> New -> Blueprint -> pick this repo.
# Then set the secret env vars (sync:false) in the dashboard:
#   DEEPSEEK_API_KEY, XF_APP_ID, XF_API_KEY, XF_API_SECRET,
#   CORS_ORIGINS = your frontend origin (e.g. https://spoken.vercel.app)
# The container binds $PORT automatically. Free tier has no persistent disk,
# so the SQLite history resets on redeploy — fine for a demo.
services:
  - type: web
    name: spoken-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: XF_APP_ID
        sync: false
      - key: XF_API_KEY
        sync: false
      - key: XF_API_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
